# Single-process launcher for TRL GRPO with 30B LoRA on 4×H100. Despite the
# filename, this config is NOT ZeRO-3 and NOT multi-GPU distributed — the 30B
# bf16 base is pipeline-sharded across the 4 visible GPUs via HF's
# `device_map="auto"` (layer-wise split, ~15 GB/GPU). LoRA adapters are the
# only trainable params, so there's nothing to all-reduce: one process is all
# we need, and it sidesteps both ZeRO-3's generate() gather (OOMed on 30B)
# and QLoRA's incompatibility with Nemotron-H's fused Mamba kernels.
compute_environment: LOCAL_MACHINE
debug: false
distributed_type: 'NO'
downcast_bf16: 'no'
enable_cpu_affinity: false
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 1
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
